server:
  port: 8080

spring:
  application:
    name: sistema-transporte

  datasource:
    url: jdbc:postgresql://localhost:5432/transporte_db
    username: postgres
    password: 2007
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Lima

app:
  jwt:
    # IMPORTANTE: debe ser un string Base64 de al menos 32 bytes.
    # Generar con: python3 -c "import base64,secrets;print(base64.b64encode(secrets.token_bytes(32)).decode())"
    secret: "T1QOp0xFD9qWMfxer3Yyxy6VYAn0MYl6SExPbO3DO2c="
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  boleto:
    prefix: "BOL"
  guia:
    prefix: "GUI"

logging:
  level:
    com.transporte: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
